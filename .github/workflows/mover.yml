name: Live Zaio Vendor Simulation

on:
  schedule:
    - cron: '*/5 * * * *' # Backup-Trigger
  workflow_dispatch: # Erlaubt manuellen Start

jobs:
  run-simulation:
    runs-on: ubuntu-latest
    steps:
    - name: Code aus GitHub auschecken
      uses: actions/checkout@v4

    - name: Node.js Umgebung einrichten
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Auf Node 24 aktualisiert

    - name: Firebase Bibliotheken installieren
      run: npm install

    - name: Skript starten und 10s Schleife ausführen
      env:
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # Erzwingt Node 24 für die Actions
      run: node simulate.js
