name: Live Zaio Vendor Simulation

on:
  schedule:
    - cron: '0 */4 * * *' # Startet automatisch einmal pro Stunde als Backup
  workflow_dispatch: # Erlaubt Ihren manuellen Start für die Präsentation

jobs:
  run-simulation:
    runs-on: ubuntu-latest
    steps:
    - name: Code aus GitHub auschecken
      uses: actions/checkout@v4

    - name: Node.js Umgebung einrichten
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Firebase Bibliotheken installieren
      run: npm install

    - name: Skript starten und 4 Stunden aktiv halten
      env:
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      run: node simulate.js
