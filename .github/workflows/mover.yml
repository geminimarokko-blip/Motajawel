name: Live Zaio Vendor Simulation

on:
  schedule:
    - cron: '*/1 * * * *' # Startet automatisch jede Minute im Hintergrund
  workflow_dispatch: # Ermöglicht den manuellen Start auf GitHub per Klick

jobs:
  run-simulation:
    runs-on: ubuntu-latest
    steps:
    - name: Code aus GitHub auschecken
      uses: actions/checkout@v4

    - name: Node.js Umgebung einrichten
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Firebase Bibliotheken installieren
      run: npm install

    - name: Skript starten und 10s Schleife ausführen
      env:
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      run: node simulate.js
