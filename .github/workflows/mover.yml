name: Live Zaio Vendor Simulation

on:
  schedule:
    - cron: '*/5 * * * *' # Nur noch als Backup alle 5 Minuten
  workflow_dispatch: # Erlaubt den manuellen Erststart

jobs:
  run-simulation:
    runs-on: ubuntu-latest
    steps:
    - name: Code aus GitHub auschecken
      uses: actions/checkout@v4

    - name: Node.js Umgebung einrichten
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Firebase Bibliotheken installieren
      run: npm install

    - name: Skript starten und 10s Schleife ausführen
      env:
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # WICHTIG: Erlaubt den unendlichen Loop
      run: node simulate.js
